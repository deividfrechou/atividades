<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado — Microsoft Word</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
  
  /* ── header ── */
  .top-bar{background:#1F4E79;color:#fff;padding:18px 24px;display:flex;align-items:center;gap:14px}
  .top-bar h1{font-size:1.25rem;font-weight:700;letter-spacing:.3px}
  .top-bar .badge{background:#2E75B6;border-radius:20px;padding:4px 12px;font-size:.78rem;white-space:nowrap}
  
  /* ── progress ── */
  .progress-wrap{background:#fff;border-bottom:1px solid #dde3ea;padding:10px 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px}
  .progress-bar{flex:1;height:8px;background:#dde3ea;border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:#2E75B6;border-radius:4px;transition:width .3s}
  .progress-label{font-size:.82rem;color:#555;white-space:nowrap;min-width:90px;text-align:right}
  
  /* ── container ── */
  .container{max-width:860px;margin:0 auto;padding:24px 16px 60px}
  
  /* ── question card ── */
  .q-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;border-left:4px solid #2E75B6;transition:border-color .2s}
  .q-card.answered-correct{border-left-color:#1a7f4b}
  .q-card.answered-wrong{border-left-color:#c0392b}
  
  .q-num{font-size:.75rem;font-weight:700;color:#2E75B6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .q-img{width:100%;max-width:520px;border:1px solid #dde3ea;border-radius:6px;margin:10px 0 14px;display:block}
  .q-text{font-size:.97rem;line-height:1.65;margin-bottom:16px;color:#1a1a2e}
  
  /* ── V/F table ── */
  .vf-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:.92rem}
  .vf-table th{background:#EDF3FB;color:#1F4E79;padding:7px 10px;text-align:left;font-weight:600;font-size:.82rem}
  .vf-table td{padding:8px 10px;border-bottom:1px solid #edf0f4;vertical-align:middle}
  .vf-table tr:last-child td{border-bottom:none}
  .vf-btn-group{display:flex;gap:8px}
  .vf-btn{padding:5px 16px;border-radius:6px;border:1.5px solid #bbb;background:#fff;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;color:#444}
  .vf-btn:hover{border-color:#2E75B6;color:#2E75B6;background:#EDF3FB}
  .vf-btn.selected-V{background:#1a7f4b;border-color:#1a7f4b;color:#fff}
  .vf-btn.selected-F{background:#c0392b;border-color:#c0392b;color:#fff}
  .vf-btn:disabled{opacity:.6;cursor:default}
  
  /* ── MC options ── */
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1.5px solid #dde3ea;cursor:pointer;transition:all .15s;background:#fff}
  .opt:hover{border-color:#2E75B6;background:#EDF3FB}
  .opt.selected{border-color:#2E75B6;background:#EDF3FB}
  .opt.correct{border-color:#1a7f4b;background:#e8f7ef;cursor:default}
  .opt.wrong{border-color:#c0392b;background:#fdecea;cursor:default}
  .opt.dimmed{opacity:.5;cursor:default}
  .opt-letter{font-weight:700;font-size:.9rem;color:#2E75B6;min-width:22px;padding-top:1px}
  .opt.correct .opt-letter{color:#1a7f4b}
  .opt.wrong .opt-letter{color:#c0392b}
  .opt-text{font-size:.93rem;line-height:1.5;color:#222}
  
  /* ── explanation ── */
  .explanation{margin-top:14px;padding:12px 14px;background:#fff8e1;border-left:4px solid #f39c12;border-radius:0 8px 8px 0;font-size:.88rem;line-height:1.55;color:#6b4c00;display:none}
  .explanation.show{display:block}
  .explanation strong{color:#5a3d00}
  
  /* ── nav buttons ── */
  .q-footer{display:flex;justify-content:flex-end;margin-top:16px}
  .btn-confirm{background:#2E75B6;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.93rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-confirm:hover{background:#1F4E79}
  .btn-confirm:disabled{background:#aaa;cursor:default}
  
  /* ── results ── */
  #results{display:none;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:32px;margin-top:8px}
  .score-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(#2E75B6 0% var(--pct),#e9eef4 var(--pct) 100%);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative}
  .score-inner{width:112px;height:112px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-pct{font-size:2rem;font-weight:800;color:#1F4E79;line-height:1}
  .score-sub{font-size:.78rem;color:#777;margin-top:2px}
  .score-msg{text-align:center;font-size:1rem;color:#333;margin-bottom:24px}
  .score-msg strong{color:#1F4E79}

  .result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
  .stat-box{padding:12px 20px;border-radius:10px;text-align:center;min-width:100px}
  .stat-box.ok{background:#e8f7ef;color:#1a7f4b}
  .stat-box.err{background:#fdecea;color:#c0392b}
  .stat-box .stat-n{font-size:1.6rem;font-weight:800;display:block}
  .stat-box .stat-l{font-size:.78rem;font-weight:600}
  
  .results-divider{border:none;border-top:2px solid #edf0f4;margin:20px 0}
  .result-q{margin-bottom:18px;padding:16px;border-radius:10px;border:1.5px solid #dde3ea}
  .result-q.ok{border-color:#1a7f4b;background:#f4fbf7}
  .result-q.err{border-color:#c0392b;background:#fef7f7}
  .result-q-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .result-tag{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}
  .result-tag.ok{background:#c8edd8;color:#14643a}
  .result-tag.err{background:#fcd7d4;color:#9b2218}
  .result-q-num{font-weight:700;font-size:.85rem;color:#555}
  .result-q-text{font-size:.88rem;color:#333;line-height:1.5;margin-bottom:8px}
  .result-answer{font-size:.85rem;margin-bottom:4px}
  .result-expl{font-size:.85rem;color:#6b4c00;background:#fff8e1;border-left:3px solid #f39c12;padding:8px 10px;border-radius:0 6px 6px 0;margin-top:6px;line-height:1.5}

  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .btn-action{padding:12px 28px;border-radius:8px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s}
  .btn-pdf{background:#1F4E79;color:#fff}
  .btn-pdf:hover{background:#163b5c}
  .btn-retry{background:#f0f4f8;color:#1F4E79;border:2px solid #2E75B6}
  .btn-retry:hover{background:#EDF3FB}

  /* ── welcome screen ── */
  #welcome{max-width:480px;margin:60px auto 0;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.11);padding:36px 32px;text-align:center}
  #welcome h2{font-size:1.3rem;color:#1F4E79;margin-bottom:8px;font-weight:700}
  #welcome p{font-size:.93rem;color:#555;margin-bottom:24px;line-height:1.6}
  #welcome input{width:100%;padding:12px 14px;border:1.5px solid #dde3ea;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:6px}
  #welcome input:focus{border-color:#2E75B6}
  #welcome .err-msg{font-size:.82rem;color:#c0392b;margin-bottom:12px;min-height:18px}
  #welcome button{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:8px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
  #welcome button:hover{background:#163b5c}
  .welcome-icon{font-size:2.8rem;margin-bottom:10px}
  #student-name-display{font-size:.88rem;color:rgba(255,255,255,.85);margin-top:2px}

  @media(max-width:540px){
    .top-bar h1{font-size:1rem}
    .container{padding:16px 10px 50px}
    .q-card{padding:16px}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>📝 Simulado — Microsoft Word</h1>
    <div id="student-name-display"></div>
  </div>
  <div class="badge">BB · CEF · Prefeituras</div>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">0 / 20 respondidas</div>
</div>

<div class="container">
  <!-- Welcome screen -->
  <div id="welcome">
    <div class="welcome-icon">📝</div>
    <h2>Simulado — Microsoft Word</h2>
    <p>Teste seus conhecimentos com <strong>20 questões</strong> no nível de concursos públicos (BB, CEF e Prefeituras).<br>Digite seu nome para começar.</p>
    <input type="text" id="student-input" placeholder="Seu nome completo" maxlength="80" onkeydown="if(event.key==='Enter')startQuiz()">
    <div class="err-msg" id="name-err"></div>
    <button onclick="startQuiz()">Iniciar Simulado →</button>
  </div>

  <div id="quiz-area" style="display:none"></div>
  <div id="results" style="display:none"></div>
</div>

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  answers: {},   // qId -> {type:"mc", value:idx} | {type:"vf", values:[...]}
  confirmed: new Set()
};

function updateProgress() {
  const total = QUESTIONS.length;
  const done = state.confirmed.size;
  const pct = Math.round(done / total * 100);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-label").textContent = done + " / " + total + " respondidas";
}

// ── Render quiz ──────────────────────────────────────────────────────────────
function renderQuiz() {
  const area = document.getElementById("quiz-area");
  area.innerHTML = "";
  QUESTIONS.forEach(q => {
    const card = document.createElement("div");
    card.className = "q-card";
    card.id = "qcard-" + q.id;
    let html = `<div class="q-num">QUESTÃO ${q.id}</div>`;
    html += `<img class="q-img" src="${IMG[q.img]}" alt="Imagem da questão ${q.id}">`;
    html += `<div class="q-text">${q.text}</div>`;

    if (q.type === "mc") {
      html += `<div class="options" id="opts-${q.id}">`;
      const letters = ["A","B","C","D","E"];
      q.options.forEach((opt, i) => {
        html += `<div class="opt" data-qid="${q.id}" data-idx="${i}" onclick="selectOpt(${q.id},${i})">
          <span class="opt-letter">${letters[i]}.</span>
          <span class="opt-text">${opt}</span>
        </div>`;
      });
      html += `</div>`;
      html += `<div class="explanation" id="expl-${q.id}"></div>`;
    } else {
      // V/F
      html += `<table class="vf-table"><thead><tr><th>Afirmação</th><th style="width:110px">Resposta</th></tr></thead><tbody>`;
      q.items.forEach((item, i) => {
        html += `<tr>
          <td>${item.text}</td>
          <td>
            <div class="vf-btn-group">
              <button class="vf-btn" id="vf-${q.id}-${i}-V" onclick="selectVF(${q.id},${i},'V')">V</button>
              <button class="vf-btn" id="vf-${q.id}-${i}-F" onclick="selectVF(${q.id},${i},'F')">F</button>
            </div>
          </td>
        </tr>`;
      });
      html += `</tbody></table>`;
      // per-item explanations
      q.items.forEach((item, i) => {
        html += `<div class="explanation" id="vf-expl-${q.id}-${i}"></div>`;
      });
    }

    html += `<div class="q-footer"><button class="btn-confirm" id="btn-${q.id}" onclick="confirm(${q.id})" disabled>Confirmar resposta</button></div>`;
    card.innerHTML = html;
    area.appendChild(card);
  });

  // submit button
  const submitWrap = document.createElement("div");
  submitWrap.style.textAlign = "center";
  submitWrap.style.marginTop = "32px";
  submitWrap.innerHTML = `<button class="btn-action btn-pdf" style="font-size:1.05rem;padding:14px 36px" onclick="submitQuiz()">Ver Resultado →</button>`;
  submitWrap.id = "submit-wrap";
  area.appendChild(submitWrap);
}

// ── Interaction ──────────────────────────────────────────────────────────────
function selectOpt(qid, idx) {
  if (state.confirmed.has(qid)) return;
  const opts = document.querySelectorAll(`[data-qid="${qid}"]`);
  opts.forEach(o => o.classList.remove("selected"));
  opts[idx].classList.add("selected");
  state.answers[qid] = { type: "mc", value: idx };
  document.getElementById("btn-" + qid).disabled = false;
}

function selectVF(qid, itemIdx, val) {
  if (state.confirmed.has(qid)) return;
  const q = QUESTIONS.find(q => q.id === qid);
  if (!state.answers[qid]) state.answers[qid] = { type: "vf", values: new Array(q.items.length).fill(null) };
  state.answers[qid].values[itemIdx] = val;
  // update buttons
  ["V","F"].forEach(v => {
    const btn = document.getElementById(`vf-${qid}-${itemIdx}-${v}`);
    btn.className = "vf-btn" + (v === val ? " selected-" + v : "");
  });
  // enable confirm if all answered
  const allDone = state.answers[qid].values.every(v => v !== null);
  document.getElementById("btn-" + qid).disabled = !allDone;
}

function confirm(qid) {
  if (state.confirmed.has(qid)) return;
  state.confirmed.add(qid);
  const q = QUESTIONS.find(q => q.id === qid);
  const ans = state.answers[qid];
  document.getElementById("btn-" + qid).disabled = true;
  const card = document.getElementById("qcard-" + qid);

  if (q.type === "mc") {
    const opts = document.querySelectorAll(`[data-qid="${qid}"]`);
    const userIdx = ans.value;
    let allCorrect = userIdx === q.correct;
    opts.forEach((o, i) => {
      o.onclick = null;
      if (i === q.correct) { o.classList.remove("selected"); o.classList.add("correct"); }
      else if (i === userIdx && userIdx !== q.correct) { o.classList.remove("selected"); o.classList.add("wrong"); }
      else { o.classList.remove("selected"); o.classList.add("dimmed"); }
    });
    const expl = document.getElementById("expl-" + qid);
    expl.innerHTML = `<strong>💡 Explicação:</strong> ${q.explanation}`;
    expl.classList.add("show");
    card.classList.add(allCorrect ? "answered-correct" : "answered-wrong");
  } else {
    let allOk = true;
    q.items.forEach((item, i) => {
      const userVal = ans.values[i];
      const ok = userVal === item.correct;
      if (!ok) allOk = false;
      ["V","F"].forEach(v => {
        const btn = document.getElementById(`vf-${qid}-${i}-${v}`);
        btn.disabled = true;
        if (v === item.correct) btn.style.background = "#1a7f4b", btn.style.borderColor = "#1a7f4b", btn.style.color = "#fff";
        else if (v === userVal) btn.style.background = "#c0392b", btn.style.borderColor = "#c0392b", btn.style.color = "#fff";
      });
      const expl = document.getElementById(`vf-expl-${qid}-${i}`);
      expl.innerHTML = `<strong>${ok ? "✅" : "❌"} Item ${i+1}:</strong> ${q.explanations[i]}`;
      expl.classList.add("show");
    });
    card.classList.add(allOk ? "answered-correct" : "answered-wrong");
  }

  updateProgress();
}

// ── Results ──────────────────────────────────────────────────────────────────
function calcScore() {
  let correct = 0, total = QUESTIONS.length;
  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans) return;
    if (q.type === "mc") {
      if (ans.value === q.correct) correct++;
    } else {
      if (q.items.every((item, i) => ans.values[i] === item.correct)) correct++;
    }
  });
  return { correct, total, pct: Math.round(correct / total * 100) };
}

function submitQuiz() {
  // confirm any unconfirmed
  QUESTIONS.forEach(q => { if (!state.confirmed.has(q.id) && state.answers[q.id]) confirm(q.id); });
  const { correct, total, pct } = calcScore();
  const msg = pct >= 80 ? "🏆 Excelente! Aprovado com folga." : pct >= 60 ? "👍 Bom resultado! Continue estudando." : "📚 Precisa reforçar mais. Bons estudos!";

  document.getElementById("quiz-area").style.display = "none";
  const res = document.getElementById("results");
  res.style.display = "block";

  let html = `
    <div style="text-align:center;margin-bottom:28px">
      <div class="score-circle" style="--pct:${pct}%">
        <div class="score-inner">
          <span class="score-pct">${pct}%</span>
          <span class="score-sub">${correct}/${total} certas</span>
        </div>
      </div>
      <div class="score-msg">${msg}<br><strong>Aluno(a): ${studentName}</strong> &nbsp;·&nbsp; Simulado Microsoft Word — BB · CEF · Prefeituras</div>
    </div>
    <div class="result-stats">
      <div class="stat-box ok"><span class="stat-n">${correct}</span><span class="stat-l">✅ Corretas</span></div>
      <div class="stat-box err"><span class="stat-n">${total - correct}</span><span class="stat-l">❌ Erradas</span></div>
    </div>
    <hr class="results-divider">
    <h2 style="font-size:1rem;color:#1F4E79;margin-bottom:16px">Revisão completa</h2>
  `;

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    let isOk = false;
    let userAnswerHTML = "", correctAnswerHTML = "";
    const letters = ["A","B","C","D","E"];

    if (q.type === "mc") {
      isOk = ans && ans.value === q.correct;
      const uIdx = ans ? ans.value : null;
      userAnswerHTML = uIdx !== null
        ? `Sua resposta: <strong>${letters[uIdx]}) ${q.options[uIdx]}</strong>`
        : "Não respondida";
      correctAnswerHTML = `Resposta correta: <strong>${letters[q.correct]}) ${q.options[q.correct]}</strong>`;
    } else {
      isOk = ans && q.items.every((item, i) => ans.values[i] === item.correct);
      const userVals = ans ? ans.values : q.items.map(() => null);
      userAnswerHTML = "Suas respostas: " + userVals.map((v,i) => `<strong>Item ${i+1}: ${v || "?"}</strong>`).join(" · ");
      correctAnswerHTML = "Respostas corretas: " + q.items.map((item, i) => `<strong>Item ${i+1}: ${item.correct}</strong>`).join(" · ");
    }

    html += `<div class="result-q ${isOk ? 'ok' : 'err'}">
      <div class="result-q-hdr">
        <span class="result-tag ${isOk ? 'ok' : 'err'}">${isOk ? "✅ CORRETA" : "❌ ERRADA"}</span>
        <span class="result-q-num">Questão ${q.id}</span>
      </div>
      <div class="result-q-text">${q.text.substring(0, 120)}...</div>
      <div class="result-answer" style="color:${isOk?'#1a7f4b':'#c0392b'}">${userAnswerHTML}</div>
      ${!isOk ? `<div class="result-answer" style="color:#1a7f4b">${correctAnswerHTML}</div>` : ""}
      ${!isOk ? `<div class="result-expl"><strong>💡 Por quê?</strong> ${q.type === "mc" ? q.explanation : q.explanations.join(" | ")}</div>` : ""}
    </div>`;
  });

  html += `<div class="actions">
    <button class="btn-action btn-pdf" onclick="downloadPDF()">⬇ Baixar resultado em PDF</button>
    <button class="btn-action btn-retry" onclick="location.reload()">🔄 Refazer simulado</button>
  </div>`;

  res.innerHTML = html;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── PDF ──────────────────────────────────────────────────────────────────────
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const { correct, total, pct } = calcScore();
  const letters = ["A","B","C","D","E"];

  let y = 18;
  const lm = 16, rm = 194, maxW = rm - lm;

  function addText(text, x, yy, opts = {}) {
    doc.setFontSize(opts.size || 10);
    doc.setFont("helvetica", opts.bold ? "bold" : "normal");
    doc.setTextColor(...(opts.color || [30, 30, 30]));
    const lines = doc.splitTextToSize(String(text), opts.maxW || maxW);
    doc.text(lines, x, yy);
    return yy + lines.length * (opts.lineH || (opts.size || 10) * 0.45);
  }

  function checkPage(needed = 12) {
    if (y + needed > 280) { doc.addPage(); y = 18; }
  }

  // Header
  doc.setFillColor(31, 78, 121);
  doc.rect(0, 0, 210, 26, "F");
  doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
  doc.text("Simulado — Microsoft Word", lm, 10);
  doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
  doc.text("Aluno(a): " + studentName, lm, 17);
  doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(200,220,255);
  doc.text("BB · CEF · Prefeituras", lm, 23);
  doc.text(new Date().toLocaleDateString("pt-BR"), rm, 23, { align:"right" });
  y = 34;

  // Score box
  doc.setFillColor(237, 243, 251);
  doc.roundedRect(lm, y, maxW, 24, 3, 3, "F");
  doc.setFontSize(22); doc.setFont("helvetica","bold"); doc.setTextColor(31, 78, 121);
  doc.text(pct + "%", lm + 8, y + 15);
  doc.setFontSize(11); doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60);
  doc.text(`${correct} acertos de ${total} questões`, lm + 30, y + 9);
  const msg = pct >= 80 ? "Excelente! Aprovado com folga." : pct >= 60 ? "Bom resultado! Continue estudando." : "Precisa reforçar mais. Bons estudos!";
  doc.setFontSize(9); doc.text(msg, lm + 30, y + 16);
  y += 32;

  // Questions
  QUESTIONS.forEach(q => {
    checkPage(20);
    const ans = state.answers[q.id];
    let isOk = false;
    if (q.type === "mc") isOk = ans && ans.value === q.correct;
    else isOk = ans && q.items.every((item, i) => ans.values[i] === item.correct);

    // Q header bar
    doc.setFillColor(isOk ? 232 : 253, isOk ? 247 : 233, isOk ? 239 : 234);
    doc.rect(lm, y, maxW, 7, "F");
    doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.setTextColor(isOk ? 26 : 192, isOk ? 127 : 57, isOk ? 75 : 43);
    doc.text(`${isOk ? "✓ CORRETA" : "✗ ERRADA"}  Questão ${q.id}`, lm + 2, y + 4.8);
    y += 10;

    // question text (short)
    checkPage(14);
    const shortText = q.text.length > 200 ? q.text.substring(0, 200) + "..." : q.text;
    y = addText(shortText, lm, y, { size: 9, color: [40,40,40] });
    y += 2;

    if (q.type === "mc") {
      const uIdx = ans ? ans.value : null;
      checkPage(8);
      if (uIdx !== null) {
        doc.setFontSize(9); doc.setFont("helvetica","bold");
        doc.setTextColor(isOk ? 26 : 192, isOk ? 127 : 57, isOk ? 75 : 43);
        y = addText(`Sua resposta: ${letters[uIdx]}) ${q.options[uIdx]}`, lm + 4, y, { size:9, bold:true });
      }
      if (!isOk) {
        checkPage(8);
        doc.setTextColor(26, 127, 75);
        y = addText(`Correta: ${letters[q.correct]}) ${q.options[q.correct]}`, lm + 4, y, { size:9, bold:true });
        checkPage(12);
        doc.setTextColor(90, 60, 0);
        y = addText("Explicação: " + q.explanation, lm + 4, y, { size:8.5, color:[90,60,0] });
      }
    } else {
      q.items.forEach((item, i) => {
        checkPage(10);
        const userVal = ans ? ans.values[i] : null;
        const itemOk = userVal === item.correct;
        doc.setFontSize(8.5); doc.setFont("helvetica","bold");
        doc.setTextColor(itemOk ? 26 : 192, itemOk ? 127 : 57, itemOk ? 75 : 43);
        y = addText(`Item ${i+1}: Sua: ${userVal||"?"} | Correta: ${item.correct}`, lm + 4, y, { size:8.5 });
        if (!itemOk) {
          checkPage(10);
          doc.setFont("helvetica","normal"); doc.setTextColor(90,60,0);
          y = addText("↳ " + q.explanations[i], lm + 8, y, { size:8, color:[90,60,0] });
        }
      });
    }
    y += 5;
  });

  // Footer on each page
  const pageCount = doc.getNumberOfPages();
  for (let p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(150,150,150);
    doc.text(`Simulado Microsoft Word — Página ${p} de ${pageCount}`, 105, 290, { align:"center" });
  }

  const safeName = studentName.replace(/[^a-zA-Z0-9À-ú ]/g, "").trim().replace(/ +/g, "_");
  doc.save(`Resultado_${safeName}_SimuladoWord.pdf`);
}

// ── Student name & start ─────────────────────────────────────────────────────
let studentName = "";

function startQuiz() {
  const input = document.getElementById("student-input").value.trim();
  if (!input) {
    document.getElementById("name-err").textContent = "Por favor, digite seu nome para continuar.";
    document.getElementById("student-input").focus();
    return;
  }
  studentName = input;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("quiz-area").style.display = "block";
  document.getElementById("progress-wrap").style.display = "flex";
  document.getElementById("student-name-display").textContent = "👤 " + studentName;
  renderQuiz();
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
